name: Publish npm Packages

on:
  push:
    tags:
      - 'npm-*'  # 匹配 npm-2026.4.19-0825 格式（glob pattern）
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm test -w @icyfenix-dmla/cli
          npm test -w @icyfenix-dmla/install

      - name: Build CLI package
        run: npm run build -w @icyfenix-dmla/cli

      - name: Verify build output
        run: |
          echo "检查构建产物..."
          ls -la packages/cli/src/server/
          if [ ! -f "packages/cli/src/server/index.js" ]; then
            echo "❌ 构建失败：缺少 server/index.js"
            exit 1
          fi
          echo "✅ 构建产物验证通过"

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # 从 npm-YYYY.M.D-HHMM 格式中提取版本号
            VERSION="${{ github.ref_name }}"
            # 移除 npm- 前缀
            VERSION="${VERSION#npm-}"
          else
            # 手动触发时生成时间戳版本
            VERSION="$(date +%Y.%-m.%-d-%H%M)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 npm Version: $VERSION"

      - name: Update package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          cd packages/cli
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          cd ../install
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          echo "✅ Package versions updated to $VERSION"

      - name: Publish @icyfenix-dmla/cli to npm
        run: |
          cd packages/cli
          npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "等待 npm registry 同步..."
          sleep 15
          echo "验证发布的包内容..."
          # 尝试下载并验证，最多等待 60 秒
          TARBALL=""
          for i in 1 2 3 4; do
            TARBALL=$(npm pack @icyfenix-dmla/cli@$VERSION --registry https://registry.npmjs.org 2>&1 | grep -E "icyfenix.*\.tgz" || true)
            if [ -n "$TARBALL" ] && [ -f "$TARBALL" ]; then
              echo "下载成功: $TARBALL"
              break
            fi
            echo "等待 registry 同步... ($i/4)"
            sleep 15
          done
          if [ ! -f "$TARBALL" ]; then
            echo "⚠️ 无法从 registry 下载包，跳过验证"
            echo "包已成功发布到 npm，请稍后手动验证"
            exit 0
          fi
          tar -tf "$TARBALL" | grep -E "server/index|server/sandbox" || {
            echo "❌ 发布的包缺少服务器文件"
            tar -tf "$TARBALL"
            exit 1
          }
          echo "✅ 发布包验证通过"

      - name: Publish @icyfenix-dmla/install to npm
        run: |
          cd packages/install
          npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## 🚀 npm 包发布完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 版本: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 发布的包" >> $GITHUB_STEP_SUMMARY
          echo "- @icyfenix-dmla/cli@$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- @icyfenix-dmla/install@$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 安装命令" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'npm install -g @icyfenix-dmla/cli@$VERSION' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY