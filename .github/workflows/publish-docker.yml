name: Publish Docker Images

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-*'  # 匹配 2026.4.17-1503 格式（不含 npm- 前缀）
  workflow_dispatch:
    inputs:
      skip_dockerhub:
        description: '跳过 Docker Hub 推送'
        required: false
        default: 'false'
      skip_acr:
        description: '跳过阿里云 ACR 推送'
        required: false
        default: 'false'

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: dmla-sandbox
  DOCKERHUB_NAMESPACE: icyfenix
  ACR_REGISTRY: crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: fenixsoft

jobs:
  build-images:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        type: [cpu, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="$(date +%Y.%-m.%-d-%H%M)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract shared modules
        run: npm run extract:shared

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.type }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: local-server/Dockerfile.sandbox${{ matrix.type == 'cpu' && '.cpu' || '' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ matrix.type }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ matrix.type }}
          outputs: type=docker,dest=/tmp/image-${{ matrix.type }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          docker load -i /tmp/image-${{ matrix.type }}.tar
          docker run --rm ${{ env.IMAGE_NAME }}:${{ matrix.type }} python3 -c "print('Image OK')"

      - name: Upload image artifact
        uses: actions/upload-artifact@v5
        with:
          name: image-${{ matrix.type }}
          path: /tmp/image-${{ matrix.type }}.tar
          retention-days: 1

  push-dockerhub:
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ always() && github.event.inputs.skip_dockerhub != 'true' && needs.build-images.result == 'success' }}
    strategy:
      matrix:
        type: [cpu, gpu]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v5
        with:
          name: image-${{ matrix.type }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image-${{ matrix.type }}.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push images
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          DOCKERHUB_NAMESPACE="icyfenix"
          IMAGE_NAME="dmla-sandbox"

          docker tag ${IMAGE_NAME}:${{ matrix.type }} \
            ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${{ matrix.type }}
          docker tag ${IMAGE_NAME}:${{ matrix.type }} \
            ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${VERSION}-${{ matrix.type }}

          docker push ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${{ matrix.type }}
          docker push ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${VERSION}-${{ matrix.type }}

          echo "✅ Pushed to Docker Hub:"
          echo "  - ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${{ matrix.type }}"
          echo "  - ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${VERSION}-${{ matrix.type }}"

  push-acr:
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ always() && github.event.inputs.skip_acr != 'true' && needs.build-images.result == 'success' }}
    strategy:
      matrix:
        type: [cpu, gpu]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v5
        with:
          name: image-${{ matrix.type }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image-${{ matrix.type }}.tar

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v4
        with:
          registry: crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Tag and push images to ACR
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ACR_REGISTRY="crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com"
          ACR_NS="fenixsoft"
          IMAGE_NAME="dmla-sandbox"

          docker tag ${IMAGE_NAME}:${{ matrix.type }} \
            ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${{ matrix.type }}
          docker tag ${IMAGE_NAME}:${{ matrix.type }} \
            ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${VERSION}-${{ matrix.type }}

          docker push ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${{ matrix.type }}
          docker push ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${VERSION}-${{ matrix.type }}

          echo "✅ Pushed to ACR:"
          echo "  - ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${{ matrix.type }}"
          echo "  - ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${VERSION}-${{ matrix.type }}"

  summary:
    runs-on: ubuntu-latest
    needs: [build-images, push-dockerhub, push-acr]
    if: ${{ always() }}
    steps:
      - name: Summary
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="$(date +%Y.%-m.%-d-%H%M)"
          fi

          echo "## 🐳 Docker 镜像发布完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 版本: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "- icyfenix/dmla-sandbox:cpu" >> $GITHUB_STEP_SUMMARY
          echo "- icyfenix/dmla-sandbox:gpu" >> $GITHUB_STEP_SUMMARY
          echo "- icyfenix/dmla-sandbox:$VERSION-cpu" >> $GITHUB_STEP_SUMMARY
          echo "- icyfenix/dmla-sandbox:$VERSION-gpu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### 阿里云 ACR（国内加速）" >> $GITHUB_STEP_SUMMARY
          echo "- crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:cpu" >> $GITHUB_STEP_SUMMARY
          echo "- crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:gpu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 拉取命令" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Docker Hub（全球）' >> $GITHUB_STEP_SUMMARY
          echo 'docker pull icyfenix/dmla-sandbox:gpu' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# 阿里云 ACR（国内加速）' >> $GITHUB_STEP_SUMMARY
          echo 'docker pull crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:gpu' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY