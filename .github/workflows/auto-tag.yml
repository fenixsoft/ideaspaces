name: Auto Tag for Sandbox Changes

on:
  push:
    branches:
      - main
    paths:
      # 仅这些路径变化触发自动打 Tag
      - 'local-server/Dockerfile.sandbox'
      - 'local-server/Dockerfile.sandbox.cpu'
      - 'local-server/shared_modules/**'
      - 'local-server/src/kernel_runner.py'

# 权限配置：需要 contents: write 才能推送 Tag
permissions:
  contents: write

# 并发控制：防止短时间内多次触发
concurrency:
  group: auto-tag
  cancel-in-progress: true

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate timestamp tag
        id: generate_tag
        run: |
          # 使用 UTC+8 时间（北京时间）
          TAG="$(TZ='Asia/Shanghai' date +%Y.%-m.%-d-%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "🕐 Generated tag: $TAG"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="${{ steps.generate_tag.outputs.tag }}"

          # 检查 tag 是否已存在
          if git tag -l | grep -q "^${TAG}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Tag $TAG already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG does not exist, creating"
          fi

      - name: Create and push tag
        if: ${{ steps.check_tag.outputs.exists == 'false' }}
        run: |
          TAG="${{ steps.generate_tag.outputs.tag }}"

          # 创建 tag
          git tag "$TAG"

          # 推送 tag
          git push origin "$TAG"

          echo "🎉 Created and pushed tag: $TAG"

      - name: Get changed files
        id: changes
        run: |
          # 获取变更的文件列表
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E "(Dockerfile|shared_modules|kernel_runner)" || true)
          # 使用 heredoc 格式处理多行输出
          {
            echo "files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Summary
        if: ${{ always() }}
        run: |
          TAG="${{ steps.generate_tag.outputs.tag }}"
          EXISTS="${{ steps.check_tag.outputs.exists }}"
          FILES="${{ steps.changes.outputs.files }}"

          echo "## 📦 自动 Tag 生成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tag: $TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$EXISTS" == "true" ]]; then
            echo "状态: ⚠️ Tag 已存在，跳过创建" >> $GITHUB_STEP_SUMMARY
          else
            echo "状态: ✅ Tag 已创建并推送" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "触发此变更的发布流程..." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 触发变更的文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -n "$FILES" ]]; then
            for file in $FILES; do
              echo "- $file" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "无匹配文件" >> $GITHUB_STEP_SUMMARY
          fi